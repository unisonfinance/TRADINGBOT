<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Crypto RBI Bot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg-primary); }
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
        }
        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-logo .logo-icon { font-size: 3rem; color: var(--red); }
        .login-logo .logo-text { font-size: 1.5rem; font-weight: 700; letter-spacing: 3px; display: block; margin-top: 0.5rem; }
        .login-logo .logo-sub { color: var(--text-muted); font-size: 0.85rem; margin-top: 0.25rem; }
        .login-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem;
        }
        .login-panel h2 { font-size: 1.1rem; margin-bottom: 1.5rem; text-align: center; }
        .login-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1.5rem;
        }
        .login-tab {
            flex: 1;
            padding: 0.75rem;
            text-align: center;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            transition: all 0.15s;
        }
        .login-tab.active { color: var(--text-primary); border-bottom-color: var(--red); }
        .login-tab:hover { color: var(--text-primary); }
        .login-error {
            background: rgba(230, 57, 70, 0.1);
            border: 1px solid var(--red-dark);
            color: var(--red);
            padding: 0.6rem 0.75rem;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
        }
        .login-success {
            background: rgba(46, 204, 113, 0.1);
            border: 1px solid var(--green-dark);
            color: var(--green);
            padding: 0.6rem 0.75rem;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
        }
        .divider {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.75rem;
            margin: 1.25rem 0;
            position: relative;
        }
        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: var(--border);
        }
        .divider::before { left: 0; }
        .divider::after { right: 0; }
        .btn-google {
            background: var(--bg-input);
            border: 1px solid var(--border-light);
            color: var(--text-primary);
            width: 100%;
            padding: 0.75rem;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn-google:hover { background: var(--bg-hover); border-color: var(--text-muted); }
        .forgot-link {
            display: block;
            text-align: center;
            margin-top: 1rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            text-decoration: none;
        }
        .forgot-link:hover { color: var(--red); }
    </style>

    <!-- Firebase SDKs -->
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('rbi-theme') || 'light');</script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="login-container">
        <div class="login-logo">
            <div class="logo-icon">◆</div>
            <span class="logo-text">RBI BOT</span>
            <div class="logo-sub">Crypto Trading Dashboard</div>
        </div>

        <div class="login-panel">
            <!-- Tabs -->
            <div class="login-tabs">
                <button class="login-tab active" onclick="showTab('login')">Sign In</button>
                <button class="login-tab" onclick="showTab('register')">Register</button>
            </div>

            <div id="loginError" class="login-error"></div>
            <div id="loginSuccess" class="login-success"></div>

            <!-- Sign In Form -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" class="form-input" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" class="form-input" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn btn-red btn-full" id="loginBtn">Sign In</button>
                <a href="#" class="forgot-link" onclick="handleForgot(event)">Forgot password?</a>
            </form>

            <!-- Register Form (hidden by default) -->
            <form id="registerForm" onsubmit="handleRegister(event)" style="display: none;">
                <div style="display:flex; gap:0.75rem;">
                    <div class="form-group" style="flex:1;">
                        <label>Name</label>
                        <input type="text" id="regName" class="form-input" placeholder="First name" required>
                    </div>
                    <div class="form-group" style="flex:1;">
                        <label>Surname</label>
                        <input type="text" id="regSurname" class="form-input" placeholder="Last name" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" class="form-input" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" class="form-input" placeholder="Min 6 characters" required minlength="6">
                </div>
                <button type="submit" class="btn btn-red btn-full" id="regBtn">Create Account</button>
            </form>

            <div class="divider">or</div>
            <button class="btn-google" onclick="handleGoogleSignIn()">
                <svg width="18" height="18" viewBox="0 0 48 48" style="vertical-align:middle; margin-right:8px;"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.09 24.09 0 0 0 0 21.56l7.98-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                Sign in with Google
            </button>
        </div>
    </div>

    <script>
        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyCn6hrf2FuZfOUSpS1rabrG6-rMzWyT3xE",
            authDomain: "trading-bot-f3bd5.firebaseapp.com",
            projectId: "trading-bot-f3bd5",
            storageBucket: "trading-bot-f3bd5.firebasestorage.app",
            messagingSenderId: "1011249632225",
            appId: "1:1011249632225:web:4e5fdc84aa3d37157178a0",
            measurementId: "G-C889LC57M6"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // If already signed in, redirect to dashboard
        auth.onAuthStateChanged((user) => {
            if (user) {
                window.location.href = '/';
            }
        });

        function showTab(tab) {
            document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('loginError').style.display = 'none';
            document.getElementById('loginSuccess').style.display = 'none';

            if (tab === 'login') {
                document.querySelectorAll('.login-tab')[0].classList.add('active');
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('registerForm').style.display = 'none';
            } else {
                document.querySelectorAll('.login-tab')[1].classList.add('active');
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('registerForm').style.display = 'block';
            }
        }

        function showError(msg) {
            const el = document.getElementById('loginError');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('loginSuccess').style.display = 'none';
        }

        function showSuccess(msg) {
            const el = document.getElementById('loginSuccess');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('loginError').style.display = 'none';
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.textContent = 'Signing in...';

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                await auth.signInWithEmailAndPassword(email, password);
                // onAuthStateChanged will redirect
            } catch (err) {
                showError(getErrorMessage(err.code));
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('regBtn');
            btn.disabled = true;
            btn.textContent = 'Creating account...';

            const name = document.getElementById('regName').value.trim();
            const surname = document.getElementById('regSurname').value.trim();
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            try {
                const cred = await auth.createUserWithEmailAndPassword(email, password);
                // Update display name
                await cred.user.updateProfile({ displayName: name + ' ' + surname });
                // Save initial profile to Firestore
                await db.collection('users').doc(cred.user.uid).set({
                    name: name,
                    surname: surname,
                    email: email,
                    created_at: firebase.firestore.FieldValue.serverTimestamp(),
                });
                // onAuthStateChanged will redirect
            } catch (err) {
                showError(getErrorMessage(err.code));
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        }

        async function handleGoogleSignIn() {
            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                const result = await auth.signInWithPopup(provider);
                // Save profile on first Google sign-in
                await db.collection('users').doc(result.user.uid).set({
                    email: result.user.email,
                    name: result.user.displayName || '',
                    updated_at: firebase.firestore.FieldValue.serverTimestamp(),
                }, { merge: true });
            } catch (err) {
                showError(getErrorMessage(err.code));
            }
        }

        async function handleForgot(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            if (!email) {
                showError('Enter your email address first');
                return;
            }
            try {
                await auth.sendPasswordResetEmail(email);
                showSuccess('Password reset email sent. Check your inbox.');
            } catch (err) {
                showError(getErrorMessage(err.code));
            }
        }

        function getErrorMessage(code) {
            const msgs = {
                'auth/user-not-found': 'No account with that email',
                'auth/wrong-password': 'Wrong password',
                'auth/invalid-email': 'Invalid email address',
                'auth/email-already-in-use': 'Email already registered',
                'auth/weak-password': 'Password must be at least 6 characters',
                'auth/too-many-requests': 'Too many attempts. Try again later.',
                'auth/popup-closed-by-user': 'Sign-in popup was closed',
                'auth/invalid-credential': 'Invalid credentials',
            };
            return msgs[code] || `Error: ${code}`;
        }
    </script>
</body>
</html>
