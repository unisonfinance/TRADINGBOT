<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="botGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
  </defs>
  <!-- Body -->
  <rect x="12" y="26" width="40" height="28" rx="7" ry="7" fill="#1a1030" stroke="url(#botGrad)" stroke-width="2"/>
  <!-- Head -->
  <rect x="18" y="10" width="28" height="20" rx="6" ry="6" fill="#120d20" stroke="url(#botGrad)" stroke-width="2"/>
  <!-- Antenna -->
  <line x1="32" y1="10" x2="32" y2="4" stroke="#A855F7" stroke-width="2" stroke-linecap="round"/>
  <circle cx="32" cy="3" r="2.5" fill="#EC4899"/>
  <!-- Eyes -->
  <rect x="22" y="16" width="7" height="7" rx="2" fill="#A855F7" opacity="0.95"/>
  <rect x="35" y="16" width="7" height="7" rx="2" fill="#EC4899" opacity="0.95"/>
  <!-- Eye inner glow -->
  <rect x="24" y="18" width="3" height="3" rx="1" fill="#fff" opacity="0.5"/>
  <rect x="37" y="18" width="3" height="3" rx="1" fill="#fff" opacity="0.5"/>
  <!-- Mouth panel -->
  <rect x="22" y="34" width="20" height="6" rx="3" fill="#A855F7" opacity="0.15" stroke="#A855F7" stroke-width="1"/>
  <!-- Mouth dots -->
  <circle cx="26" cy="37" r="1.5" fill="#A855F7"/>
  <circle cx="32" cy="37" r="1.5" fill="#C084FC"/>
  <circle cx="38" cy="37" r="1.5" fill="#EC4899"/>
  <!-- Chest panel -->
  <rect x="22" y="44" width="20" height="6" rx="3" fill="#A855F7" opacity="0.1" stroke="#A855F744" stroke-width="1"/>
  <!-- Chest bars -->
  <rect x="24" y="46" width="8" height="2" rx="1" fill="#A855F7" opacity="0.7"/>
  <rect x="34" y="46" width="5" height="2" rx="1" fill="#EC4899" opacity="0.4"/>
  <!-- Arms -->
  <rect x="4" y="28" width="8" height="18" rx="4" fill="#1a1030" stroke="#A855F7" stroke-width="1.5"/>
  <rect x="52" y="28" width="8" height="18" rx="4" fill="#1a1030" stroke="#EC4899" stroke-width="1.5"/>
  <!-- Legs -->
  <rect x="18" y="53" width="11" height="9" rx="3" fill="#1a1030" stroke="#A855F7" stroke-width="1.5"/>
  <rect x="35" y="53" width="11" height="9" rx="3" fill="#1a1030" stroke="#EC4899" stroke-width="1.5"/>
</svg>
